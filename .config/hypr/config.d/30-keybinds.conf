$mainMod = SUPER

# ── applications ─────────────────────────────────────────────────────────────
bind = $mainMod,       Return,  exec, kitty
bind = $mainMod,       E,       exec, kitty -e yazi
bind = $mainMod,       Space,   exec, ~/.config/hypr/scripts/rofi-launcher.sh
bind = $mainMod,       ESCAPE,  exec, ~/.config/hypr/scripts/rofi-powermenu.sh

# ── window management ─────────────────────────────────────────────────────────
bind = $mainMod,       Q,       killactive,
bind = $mainMod SHIFT, E,       exit,
bind = $mainMod,       V,       togglefloating,
bind = $mainMod,       F,       fullscreen
bind = $mainMod,       P,       pseudo,
bind = $mainMod,       J,       togglesplit,

# ── wallpaper ─────────────────────────────────────────────────────────────────
# Super+W         → picker with name + thumbnail preview
# Super+Shift+W   → random wallpaper
# Super+Alt+W     → cycle wallpapers in order
bind = $mainMod,             W, exec, ~/.config/hypr/scripts/wallpaper-picker.sh
bind = $mainMod SHIFT,       W, exec, ~/.config/hypr/scripts/wallpaper-random.sh
bind = $mainMod ALT,         W, exec, ~/.config/hypr/scripts/wallpaper-cycle.sh

# ── utilities ─────────────────────────────────────────────────────────────────
# Super+/         → keybindings cheat-sheet
# Super+Shift+V   → clipboard history (paste on select, Alt+P to pin)
bind = $mainMod,       slash,   exec, ~/.config/hypr/scripts/rofi-keybinds.sh
bind = $mainMod SHIFT, V,       exec, ~/.config/hypr/scripts/clipboard-history.sh

# ── focus movement ────────────────────────────────────────────────────────────
bind = $mainMod, left,  movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up,    movefocus, u
bind = $mainMod, down,  movefocus, d

# ── workspace switching ───────────────────────────────────────────────────────
bind = $mainMod,       1, workspace, 1
bind = $mainMod,       2, workspace, 2
bind = $mainMod,       3, workspace, 3
bind = $mainMod,       4, workspace, 4
bind = $mainMod,       5, workspace, 5

# ── move window to workspace ──────────────────────────────────────────────────
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5

# ── mouse window control ──────────────────────────────────────────────────────
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# ── media / system ────────────────────────────────────────────────────────────
bind = , XF86AudioRaiseVolume,   exec, ~/.config/hypr/scripts/volume.sh up
bind = , XF86AudioLowerVolume,   exec, ~/.config/hypr/scripts/volume.sh down
bind = , XF86AudioMute,          exec, ~/.config/hypr/scripts/volume.sh mute
bind = , XF86MonBrightnessUp,    exec, ~/.config/hypr/scripts/brightness.sh up
bind = , XF86MonBrightnessDown,  exec, ~/.config/hypr/scripts/brightness.sh down

# ── screenshots / recording ───────────────────────────────────────────────────
bind = ,       Print, exec, ~/.config/hypr/scripts/screenshot.sh
bind = SHIFT,  Print, exec, ~/.config/hypr/scripts/screenrecord.sh
